basics-loops-for-range: |-
  # loop n times
  for i in range(5):
      print(i)

  # range with start and stop
  for i in range(2, 6):
      print(i)

  # range with step
  for i in range(0, 10, 2):
      print(i)

basics-loops-while: |-
  count = 0

  while count < 5:
      print(count)
      count += 1   # same as: count = count + 1

basics-functions-def: |-
