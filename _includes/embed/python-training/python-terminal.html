{% assign terminal_id = include.id | default: 'python-terminal' %}

<div id="{{ terminal_id }}-wrapper" class="py-terminal-wrapper">
  <div id="{{ terminal_id }}-live">
    <!-- PyScript mpy terminal injected here on scroll -->
  </div>
</div>

<script>
(function () {
  var wrapperId = '{{ terminal_id }}-wrapper';
  var liveId    = '{{ terminal_id }}-live';
  var loaded    = false;

  function injectPyScript() {
    if (document.querySelector('script[src*="pyscript.net/releases/2026.3.1/core.js"]')) {
      return;
    }
    var link = document.createElement('link');
    link.rel  = 'stylesheet';
    link.href = 'https://pyscript.net/releases/2026.3.1/core.css';
    document.head.appendChild(link);

    var s = document.createElement('script');
    s.type = 'module';
    s.src  = 'https://pyscript.net/releases/2026.3.1/core.js';
    document.head.appendChild(s);
  }

  function injectTerminal() {
    var live = document.getElementById(liveId);
    if (!live) return;
    var tag = document.createElement('script');
    tag.type = 'mpy';
    tag.setAttribute('terminal', '');
    tag.setAttribute('worker', '');
    tag.textContent = 'import code\ncode.interact()';
    live.appendChild(tag);
  }

  function activate() {
    if (loaded) return;
    loaded = true;
    injectPyScript();
    injectTerminal();
  }

  var wrapper = document.getElementById(wrapperId);
  if (!wrapper) return;

  if ('IntersectionObserver' in window) {
    var observer = new IntersectionObserver(function (entries, obs) {
      entries.forEach(function (entry) {
        if (entry.isIntersecting) {
          obs.disconnect();
          activate();
        }
      });
    }, { threshold: 0.1 });
    observer.observe(wrapper);
  } else {
    activate();
  }
}());
</script>
